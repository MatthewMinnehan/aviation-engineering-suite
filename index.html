<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aviation Engineering Suite</title>

    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header>
        <h1>Aviation Engineering Suite</h1>
        <p>Density Altitude Calculator</p>
    </header>

    <main>

        <section class="calculator">

            <div class="input-panel">

                <div class="panel-title">
                    INPUT PARAMETERS
                </div>

                <label>
                    <span>Aircraft</span>

                    <select id="aircraft">
                        <option value="c172">Cessna 172</option>
                        <option value="da40">Diamond DA40</option>
                        <option value="sr22">Cirrus SR22</option>
                    </select>
                </label>

                <label>
                    <span>Airport Elevation (ft)</span>
                    <input id="elevation" type="number">
                </label>

                <label>
                    <span>Temperature (°C)</span>
                    <input id="temperature" type="number">
                </label>

                <label>
                    <span>Pressure Altitude (ft)</span>
                    <input id="pressureAltitude" type="number">
                </label>

                <button id="calculateBtn">
                    CALCULATE DENSITY ALTITUDE
                </button>

            </div>

            <div class="result-panel">

                <div class="panel-title">
                    RESULT
                </div>

                <div class="result-circle">
                    ✈
                </div>

                <div id="result">
                    0 ft
                </div>

                <div class="info-box" id="conditionBox">
                    Enter values to calculate.
                </div>

            </div>

        </section>

    </main>

    <script src="aircraft-data.js"></script>
    <script src="app.js"></script>

</body>
</html>
